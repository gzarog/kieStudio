name: Deploy

# Auto-deploy to Cloudflare Pages on every push to main.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN   — a token with the "Cloudflare Pages: Edit" permission
#   CLOUDFLARE_ACCOUNT_ID  — your Cloudflare account ID (Dashboard → Workers & Pages → right sidebar)
#
# No kie.ai key is ever needed here — the app is BYOK, so there are no app secrets to inject.
# Until both secrets are set, the deploy step is skipped (with a warning) so main stays green.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # secrets aren't allowed in job/step `if:`, so detect them in a step and gate on its output.
      - name: Detect Cloudflare credentials
        id: cf
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -n "$CLOUDFLARE_API_TOKEN" ] && [ -n "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Cloudflare secrets not configured — skipping deploy. Add CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID in repo settings."
          fi

      - uses: actions/setup-node@v4
        if: steps.cf.outputs.ready == 'true'
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: steps.cf.outputs.ready == 'true'
        run: npm ci

      - name: Build
        if: steps.cf.outputs.ready == 'true'
        run: npm run build

      - name: Deploy to Cloudflare Pages
        if: steps.cf.outputs.ready == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=kie-studio --branch=main
